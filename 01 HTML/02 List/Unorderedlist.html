<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered List</title>
</head>
<body>
    <h1>Unordered List</h1>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <!-- type attribute : disc, circle, square -->
    <h2>Unordered List with type attribute</h2>
    <ul type="disc">
        <li>Disc Item 1</li>
        <li>Disc Item 2</li>
        <li>Disc Item 3</li>
    </ul>
    <ul type="circle">
        <li>Circle Item 1</li>
        <li>Circle Item 2</li>
        <li>Circle Item 3</li>
    </ul>
</body>
</html>
