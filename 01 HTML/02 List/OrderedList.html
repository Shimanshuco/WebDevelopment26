<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List</title>
</head>
<body>
    <h1>Ordered List</h1>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <!-- type attribute : 1, A, a, I, i -->
    <h2>Ordered List with type attribute</h2>
    <ol type="1">
        <li>Number Item 1</li>
        <li>Number Item 2</li>
        <li>Number Item 3</li>
    </ol>
    <ol type="A">
        <li>Uppercase Letter Item 1</li>
        <li>Uppercase Letter Item 2</li>
        <li>Uppercase Letter Item 3</li>
    </ol>
</body>
</html>
