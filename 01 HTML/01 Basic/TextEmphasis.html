<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Emphasis</title>
</head>
<body>
    <h1>Text Emphasis</h1>
    <b>Bold Text</b><br>
    <i>Italic Text</i><br>
    <u>Underline Text</u><br>
    <hr/>
    <!-- Alternative Semantic Tags -->
    <strong>Strong Text</strong><br>
    <em>Emphasis Text</em>
</body>
</html>
