<!DOCTYPE html>  
<!-- DOCTYPE declaration : This defines the HTML version -->
<html lang="en">
<!-- <html> : Opening tag defines the HTML document -->
<head>
<!-- <head> : Opening tag defines the head section -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <!-- <title> : Opening tag defines the title of the document -->
</head>
<!-- </head> : Closing tag defines the head section -->
<body>
<!-- <body> : Opening tag defines the body section (appears on the main page) -->
    
</body>
<!-- </body> : Closing tag defines the body section -->
</html>
<!-- </html> : Closing tag defines the HTML document -->
