<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Element</title>
</head>
<body>
    <h1>Anchor Element</h1>
    <p>This is an anchor element: <a href="https://www.google.com">Visit Google.com</a></p>
    <!-- target="_blank" opens the link in a new tab -->
    <p>This is an anchor element that opens in a new tab: <a href="https://www.google.com" target="_blank">Visit Google.com</a></p>
    <!-- target="_self" opens the link in the same tab (default) -->
    <p>This is an anchor element that opens in the same tab: <a href="https://www.google.com" target="_self">Visit Google.com</a></p>
    <!-- href : Hyperlink Reference -->

    <!-- Links :  -->
    <!-- Absolute Links   -->
    <!-- Relative Links -->
</body>
</html>
